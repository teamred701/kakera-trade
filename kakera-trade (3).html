async function getWebhookUrl() {
  try {
    const data = await sbFetch("/settings?key=eq.webhook_url&select=value");
    return data[0]?.value || "";
  } catch { return ""; }
}

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...options,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "return=representation",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

function calcScore(myWant, myOffer, theirWant, theirOffer) {
  return myOffer.filter(id => theirWant.includes(id)).length
       + theirOffer.filter(id => myWant.includes(id)).length;
}

async function sendDiscord(webhookUrl, embed) {
  try {
    const r = await fetch(webhookUrl, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({embeds:[embed]}) });
    return r.ok;
  } catch { return false; }
}

async function sendDiscordWithMention(webhookUrl, mention, embed) {
  try {
    const body = { embeds:[embed] };
    if(mention) body.content = mention + " マッチしました！";
    const r = await fetch(webhookUrl, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
    return r.ok;
  } catch { return false; }
}

function parsePost(p) {
  return { ...p, want:JSON.parse(p.want||"[]"), offer:JSON.parse(p.offer||"[]"), postedAt:new Date(p.created_at).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}) };
}

        </div>
      </header>

      <nav style={{display:"flex",gap:4,padding:"16px 24px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"rgba(168,85,247,0.15)":"transparent",border:tab===t.id?"1px solid rgba(168,85,247,0.4)":"1px solid transparent",borderBottom:"none",borderRadius:"8px 8px 0 0",color:tab===t.id?"#c084fc":"#666",padding:"8px 18px",fontSize:14,fontWeight:tab===t.id?600:400,cursor:"pointer",position:"relative"}}>
          {t.label}{t.id==="settings"&&unread>0&&<span style={{position:"absolute",top:5,right:6,width:7,height:7,borderRadius:"50%",background:"#f87171"}}/>}
        </button>)}
      </nav>

      <main style={{padding:24,maxWidth:800,margin:"0 auto"}}>
        {error&&<div style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:10,padding:"10px 16px",marginBottom:16,fontSize:13,color:"#fca5a5",display:"flex",justifyContent:"space-between"}}>
          ⚠️ {error}<button onClick={()=>setError(null)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer"}}>✕</button>
        </div>}

        {tab==="dashboard"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
            {[{l:"所持済み",v:owned.filter(n=>n>=1).length,c:"#22d3ee",i:"✅"},{l:"不足",v:missing.length,c:"#f87171",i:"❌"},{l:"余剰",v:surplus.length,c:"#fbbf24",i:"🔄"}].map(c=><div key={c.l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:16,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:800,color:c.c}}>{c.v}</div>
              <div style={{fontSize:12,color:"#666",marginTop:4}}>{c.i} {c.l}</div>
            </div>)}
          </div>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"14px 18px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666",marginBottom:8}}>
              <span>コンプリートまでの進捗</span><span style={{color:"#a855f7",fontWeight:600}}>{owned.filter(n=>n>=1).length}/11</span>
            </div>
            <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(owned.filter(n=>n>=1).length/11)*100}%`,background:"linear-gradient(90deg,#a855f7,#6366f1)",borderRadius:4,transition:"width 0.4s"}}/>
            </div>
            <div style={{display:"flex",gap:4,marginTop:10}}>
              {KAKERA_LIST.map((k,i)=><div key={k.id} title={k.name} style={{flex:1,height:28,borderRadius:4,background:owned[i]>=1?`${k.color}44`:"rgba(255,255,255,0.04)",border:`1px solid ${owned[i]>=1?k.color+"66":"rgba(255,255,255,0.08)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,cursor:"default"}}>
                {owned[i]>=1?k.emoji:"·"}
              </div>)}
            </div>
          </div>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:20}}>
            <h3 style={{margin:"0 0 16px",fontSize:14,color:"#888",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em"}}>カケラ所持数を入力</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10}}>
              {KAKERA_LIST.map((k,i)=>{
                const n=owned[i],st=n===0?"m":n===1?"h":"s";
                const bc={m:"rgba(248,113,113,",h:"rgba(34,211,238,",s:"rgba(251,191,36,"};
                return <div key={k.id} style={{background:`${bc[st]}0.05)`,border:`1px solid ${bc[st]}0.2)`,borderRadius:10,padding:"14px 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:`${k.color}22`,border:`2px solid ${k.color}${n===0?"33":"88"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,filter:n===0?"grayscale(1) opacity(0.35)":"none"}}>{k.emoji}</div>
                  <div style={{fontSize:13,fontWeight:700,color:n===0?"#444":"#ddd"}}>{k.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setOwned(p=>{const a=[...p];a[i]=Math.max(0,a[i]-1);return a;})} style={{width:26,height:26,borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#ccc",cursor:"pointer",fontSize:16}}>−</button>
                    <span style={{fontSize:18,fontWeight:800,minWidth:22,textAlign:"center",color:n===0?"#f87171":n>1?"#fbbf24":"#22d3ee"}}>{n}</span>
                    <button onClick={()=>setOwned(p=>{const a=[...p];a[i]++;return a;})} style={{width:26,height:26,borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#ccc",cursor:"pointer",fontSize:16}}>＋</button>
                  </div>
                  <div style={{fontSize:10,color:st==="m"?"#f87171":st==="s"?"#fbbf24":"#22d3ee",fontWeight:600}}>{st==="m"?"不足":st==="s"?`×${n} 余剰`:"所持済み"}</div>
                </div>;
              })}
            </div>
          </div>
        </div>}

        {tab==="post"&&<div>
          {posted&&<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:12,padding:"12px 16px",marginBottom:20,color:"#4ade80",fontWeight:600}}>✅ 投稿しました！マッチングタブで確認できます。</div>}
          {!settings.myUser&&<div style={{background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.25)",borderRadius:10,padding:"10px 16px",marginBottom:16,fontSize:13,color:"#fbbf24"}}>💡「通知設定」タブで名前と連絡先を設定してください。</div>}
          <div style={{display:"grid",gap:16}}>
            {[
              {label:"❌ 欲しいカケラ",color:"#f87171",abg:"rgba(248,113,113,0.2)",ab:"rgba(248,113,113,0.6)",list:myWant,toggle:id=>setMyWant(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])},
              {label:"🔄 渡せるカケラ",color:"#fbbf24",abg:"rgba(251,191,36,0.15)",ab:"rgba(251,191,36,0.5)",list:myOffer,toggle:id=>setMyOffer(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])},
            ].map(s=><div key={s.label} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:20}}>
              <h3 style={{margin:"0 0 14px",fontSize:14,color:s.color,fontWeight:600}}>{s.label}</h3>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {KAKERA_LIST.map(k=><button key={k.id} onClick={()=>s.toggle(k.id)} style={{background:s.list.includes(k.id)?s.abg:"rgba(255,255,255,0.04)",border:s.list.includes(k.id)?`1px solid ${s.ab}`:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"7px 14px",cursor:"pointer",color:s.list.includes(k.id)?s.color:"#666",fontSize:14,fontWeight:s.list.includes(k.id)?700:400,transition:"all 0.15s"}}>
                  {k.emoji} {k.name}{s.list.includes(k.id)?" ✓":""}
                </button>)}
              </div>
            </div>)}
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:20}}>
              <h3 style={{margin:"0 0 14px",fontSize:14,color:"#888",fontWeight:600}}>📩 連絡先</h3>
              <input value={contact} onChange={e=>setContact(e.target.value)} placeholder={settings.myContact||"@yourname / Discord: name#1234"} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"10px 14px",color:"#e8e8f0",fontSize:14,outline:"none"}}/>
            </div>
            <button onClick={handlePost} disabled={!myWant.length||!myOffer.length||posting} style={{background:myWant.length&&myOffer.length&&!posting?"linear-gradient(90deg,#a855f7,#6366f1)":"rgba(255,255,255,0.06)",border:"none",borderRadius:12,padding:14,color:myWant.length&&myOffer.length&&!posting?"#fff":"#444",fontSize:15,fontWeight:700,cursor:myWant.length&&myOffer.length&&!posting?"pointer":"not-allowed"}}>
              {posting?"⏳ 投稿中...":"🚀 募集を投稿する"}
            </button>
          </div>
        </div>}

        {tab==="board"&&<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:700}}>交換募集一覧</h2>
              <button onClick={()=>loadPosts()} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#666",cursor:"pointer"}}>🔄 更新</button>
            </div>
            <div style={{display:"flex",gap:8}}>
              {[{id:"all",l:"すべて"},{id:"match",l:"✨ マッチのみ"}].map(f=><button key={f.id} onClick={()=>setFilter(f.id)} style={{background:filter===f.id?"rgba(168,85,247,0.2)":"rgba(255,255,255,0.05)",border:filter===f.id?"1px solid rgba(168,85,247,0.5)":"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"6px 14px",fontSize:13,color:filter===f.id?"#c084fc":"#666",cursor:"pointer",fontWeight:filter===f.id?600:400}}>{f.l}</button>)}
            </div>
          </div>
          {!myWant.length&&<div style={{background:"rgba(168,85,247,0.07)",border:"1px solid rgba(168,85,247,0.2)",borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#a78bfa"}}>💡「交換募集」タブで欲しい/渡せるカケラを選ぶとマッチスコアが表示されます。</div>}
          {loading?<div style={{textAlign:"center",padding:60,color:"#555"}}>⏳ 読み込み中...</div>
          :filtered.length===0?<div style={{textAlign:"center",padding:60,color:"#555"}}><div style={{fontSize:40,marginBottom:12}}>📭</div><div>まだ募集がありません。最初に投稿してみましょう！</div></div>
          :<div style={{display:"flex",flexDirection:"column",gap:12}}>
            {filtered.map(post=>{
              const im=post.score>0, isMe=post.user===(settings.myUser||"名無し");
              return <div key={post.id} style={{background:im?"rgba(168,85,247,0.07)":"rgba(255,255,255,0.02)",border:im?"1px solid rgba(168,85,247,0.3)":"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:18,position:"relative",overflow:"hidden"}}>
                {im&&<div style={{position:"absolute",top:0,right:0,background:"linear-gradient(135deg,#a855f7,#6366f1)",padding:"3px 14px",borderBottomLeftRadius:10,fontSize:11,fontWeight:700,color:"#fff"}}>✨ マッチ度 {post.score}</div>}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{post.avatar}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15}}>{post.user} {isMe&&<span style={{fontSize:11,color:"#a855f7",background:"rgba(168,85,247,0.15)",borderRadius:4,padding:"1px 6px"}}>自分</span>}</div>
                    <div style={{fontSize:11,color:"#555"}}>{post.postedAt} · <span style={{color:post.remaining==="まもなく削除"?"#f87171":"#555"}}>{post.remaining}</span></div>
                  </div>
                  {isMe&&<button onClick={()=>handleDelete(post.id)} style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:6,padding:"4px 10px",color:"#f87171",fontSize:12,cursor:"pointer"}}>削除</button>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[{label:"❌ 欲しい",ids:post.want,check:id=>myOffer.includes(id),dc:"#fca5a5"},{label:"🔄 渡せる",ids:post.offer,check:id=>myWant.includes(id),dc:"#fde68a"}].map(s=><div key={s.label}>
                    <div style={{fontSize:11,color:s.label.startsWith("❌")?"#f87171":"#fbbf24",fontWeight:600,marginBottom:6}}>{s.label}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {s.ids.map(id=>{const k=KAKERA_LIST[id-1],h=s.check(id);return <span key={id} style={{fontSize:12,borderRadius:6,padding:"3px 9px",background:h?"rgba(34,197,94,0.15)":"rgba(255,255,255,0.06)",border:h?"1px solid rgba(34,197,94,0.4)":"1px solid rgba(255,255,255,0.1)",color:h?"#4ade80":s.dc}}>{k?.emoji} {k?.name}{h?" ✓":""}</span>;})}
                    </div>
                  </div>)}
                </div>
                <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:12,color:"#555"}}>📩 {post.contact}</span>
                  {!isMe&&<button style={{background:im?"linear-gradient(90deg,#a855f7,#6366f1)":"rgba(255,255,255,0.07)",border:"none",borderRadius:8,padding:"7px 18px",color:im?"#fff":"#777",fontSize:13,fontWeight:600,cursor:"pointer"}}>{im?"✨ 連絡する":"💬 連絡する"}</button>}
                </div>
              </div>;
            })}
          </div>}
        </div>}

        {tab==="settings"&&<SettingsTab settings={settings} setSettings={setSettings} testStatus={testStatus} setTestStatus={setTestStatus}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
